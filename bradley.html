<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novedades</title>
    <link rel="stylesheet" href="bradley.css">
</head>
<body>

<header class="header">
    <h1>Novedades en Tenis</h1>
</header>

<!-- FILTROS POR MARCA -->
<section class="filtros">
    <button class="filtro-btn active" data-marca="todos">Todos</button>
    <button class="filtro-btn" data-marca="nike">Nike</button>
    <button class="filtro-btn" data-marca="adidas">Adidas</button>
    <button class="filtro-btn" data-marca="puma">Puma</button>
    <button class="filtro-btn" data-marca="newbalance">New Balance</button>
    <button class="filtro-btn" data-marca="reebok">Reebok</button>
    <button class="filtro-btn" data-marca="asics">Asics</button>
</section>

<main class="contenedor">

    <!-- NIKE -->
    <div class="card" data-marca="nike">
        <img src="img/nike1.jpg" alt="Nike Air Zoom">
        <h2>Nike Air Zoom</h2>
    </div>

    <div class="card" data-marca="nike">
        <img src="img/nike2.jpg" alt="Nike Air Max 270">
        <h2>Nike Air Max 270</h2>
    </div>

    <div class="card" data-marca="nike">
        <img src="img/nike3.jpg" alt="Nike Revolution 6">
        <h2>Nike Revolution 6</h2>
    </div>

    <!-- ADIDAS -->
    <div class="card" data-marca="adidas">
        <img src="img/adidas1.jpg" alt="Adidas Ultraboost">
        <h2>Adidas Ultraboost</h2>
    </div>

    <div class="card" data-marca="adidas">
        <img src="img/adidas2.jpg" alt="Adidas NMD R1">
        <h2>Adidas NMD R1</h2>
    </div>

    <div class="card" data-marca="adidas">
        <img src="img/adidas3.jpg" alt="Adidas Superstar">
        <h2>Adidas Superstar</h2>
    </div>

    <!-- PUMA -->
    <div class="card" data-marca="puma">
        <img src="img/puma1.jpg" alt="Puma RS-X">
        <h2>Puma RS-X</h2>
    </div>

    <div class="card" data-marca="puma">
        <img src="img/puma2.jpg" alt="Puma Future Rider">
        <h2>Puma Future Rider</h2>
    </div>

    <div class="card" data-marca="puma">
        <img src="img/puma3.jpg" alt="Puma Cali Sport">
        <h2>Puma Cali Sport</h2>
    </div>

    <!-- NEW BALANCE -->
    <div class="card" data-marca="newbalance">
        <img src="img/newbalance1.jpg" alt="New Balance 574">
        <h2>New Balance 574</h2>
    </div>

    <div class="card" data-marca="newbalance">
        <img src="img/newbalance2.jpg" alt="New Balance 990">
        <h2>New Balance 990</h2>
    </div>

    <!-- REEBOK -->
    <div class="card" data-marca="reebok">
        <img src="img/reebok1.jpg" alt="Reebok Classic">
        <h2>Reebok Classic</h2>
    </div>

    <div class="card" data-marca="reebok">
        <img src="img/reebok2.jpg" alt="Reebok Nano X">
        <h2>Reebok Nano X</h2>
    </div>

    <!-- ASICS -->
    <div class="card" data-marca="asics">
        <img src="img/asics1.jpg" alt="Asics Gel-Kayano">
        <h2>Asics Gel-Kayano</h2>
    </div>

    <div class="card" data-marca="asics">
        <img src="img/asics2.jpg" alt="Asics Gel-Nimbus">
        <h2>Asics Gel-Nimbus</h2>
    </div>

</main>

<script src="bradley.js"></script>
</body>
</html>
