<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Productos</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    font-family: Arial;
    margin:0;
    background:#111;
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    background:#000;
}

nav a{
    color:white;
    margin-left:15px;
    text-decoration:none;
}

.filtros{
    text-align:center;
    margin:20px;
}

.filtros button{
    margin:5px;
    padding:10px 20px;
    border:none;
    cursor:pointer;
}

.productos{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    background:#222;
    padding:20px;
    border-radius:10px;
    width:250px;
    text-align:center;
}

.card img{
    width:200px;
}

.btn-carrito{
    margin-top:10px;
    padding:10px;
    border:none;
    background:#28a745;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

</style>

</head>

<body>

<header>

<h1>Tenis</h1>

<nav>
<a href="index.html">Inicio</a>
<a href="carrito.html">Carrito</a>
</nav>

</header>


<!-- FILTROS -->

<div class="filtros">

<button class="filtro-btn" data-marca="todos">Todos</button>
<button class="filtro-btn" data-marca="nike">Nike</button>
<button class="filtro-btn" data-marca="adidas">Adidas</button>
<button class="filtro-btn" data-marca="puma">Puma</button>

</div>


<!-- PRODUCTOS -->

<div class="productos">


<!-- NIKE -->

<div class="card" data-marca="nike">

<img src="img/nike1.jpg" alt="Nike Air Zoom">

<h3>Nike Air Zoom</h3>

<button class="btn-carrito"
data-nombre="Nike Air Zoom"
data-img="img/nike1.jpg">

Agregar al carrito

</button>

</div>


<div class="card" data-marca="nike">

<img src="img/nike2.jpg" alt="Nike Revolution">

<h3>Nike Revolution</h3>

<button class="btn-carrito"
data-nombre="Nike Revolution"
data-img="img/nike2.jpg">

Agregar al carrito

</button>

</div>


<!-- ADIDAS -->

<div class="card" data-marca="adidas">

<img src="img/adidas1.jpg" alt="Adidas Ultraboost">

<h3>Adidas Ultraboost</h3>

<button class="btn-carrito"
data-nombre="Adidas Ultraboost"
data-img="img/adidas1.jpg">

Agregar al carrito

</button>

</div>


<div class="card" data-marca="adidas">

<img src="img/adidas2.jpg" alt="Adidas Runfalcon">

<h3>Adidas Runfalcon</h3>

<button class="btn-carrito"
data-nombre="Adidas Runfalcon"
data-img="img/adidas2.jpg">

Agregar al carrito

</button>

</div>


<!-- PUMA -->

<div class="card" data-marca="puma">

<img src="img/puma1.jpg" alt="Puma RS-X">

<h3>Puma RS-X</h3>

<button class="btn-carrito"
data-nombre="Puma RS-X"
data-img="img/puma1.jpg">

Agregar al carrito

</button>

</div>


<div class="card" data-marca="puma">

<img src="img/puma2.jpg" alt="Puma Smash">

<h3>Puma Smash</h3>

<button class="btn-carrito"
data-nombre="Puma Smash"
data-img="img/puma2.jpg">

Agregar al carrito

</button>

</div>


</div>


<script src="bradley.js"></script>

</body>
</html>
