<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inicio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
}
nav a{
    color:white;
    margin-left:15px;
    text-decoration:none;
}
header {
    text-align: center;
    padding: 2rem;
    background: #1a1a1a;
}

/* Contenedor scroll */
.scroll-container {
    overflow-x: auto;
    white-space: nowrap;
    padding: 2rem;
    scroll-behavior: smooth;
}

/* Scroll personalizado */
.scroll-container::-webkit-scrollbar {
    height: 10px;
}

.scroll-container::-webkit-scrollbar-thumb {
    background: #00c853;
    border-radius: 10px;
}

.scroll-container::-webkit-scrollbar-track {
    background: #333;
}

/* Tarjetas */
.marca-card {
    display: inline-block;
    background: #1e1e1e;
    margin-right: 20px;
    border-radius: 10px;
    width: 250px;
    text-align: center;
    transition: 0.3s;
}

.marca-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px 10px 0 0;
}

.marca-card h2 {
    padding: 1rem;
}

.marca-card:hover {
    transform: scale(1.05);
}

</style>
</head>

<body>

<header class="menu">
    <div class="logo">LOGO</div>
    <h1>Marcas Disponibles</h1>

    <nav class="nav">
        <a href="bradley.html">Nuevo</a>
        <a href="carrito.html">Carrito</a>
    </nav>
</header>

<section class="scroll-container">

    <div class="marca-card">
        <img src="img/nike.png" alt="Nike">
        <h2>Nike</h2>
    </div>

    <div class="marca-card">
        <img src="img/adidas.png" alt="Adidas">
        <h2>Adidas</h2>
    </div>

    <div class="marca-card">
        <img src="img/puma.png" alt="Puma">
        <h2>Puma</h2>
    </div>

    <div class="marca-card">
        <img src="img/newbalance.png" alt="New Balance">
        <h2>New Balance</h2>
    </div>

    <div class="marca-card">
        <img src="img/reebok.png" alt="Reebok">
        <h2>Reebok</h2>
    </div>

    <div class="marca-card">
        <img src="img/asics.png" alt="Asics">
        <h2>Asics</h2>
    </div>

</section>



<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

</body>
</html>
