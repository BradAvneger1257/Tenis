<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrito | SneakerStore</title>

<link rel="icon" href="img/sneaker.png">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:#0f0f0f;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:#111;
}

.iconos{
display:flex;
gap:20px;
}

.iconos a{
color:white;
font-size:22px;
}

.logo{
color:#00c853;
font-weight:700;
}

/* ===== ENVIO GRATIS ===== */

.envio{
text-align:center;
padding:12px;
font-size:14px;
background:#ff9800;
}

/* ===== CONFIANZA ===== */

.confianza{
display:flex;
justify-content:center;
gap:50px;
padding:25px;
background:#111;
flex-wrap:wrap;
}

.confianza-item{
text-align:center;
font-size:14px;
}

.confianza-item i{
font-size:26px;
color:#00c853;
margin-bottom:5px;
}

/* LAYOUT */

.carrito-layout{
display:flex;
gap:40px;
max-width:1200px;
margin:auto;
padding:20px;
}

#carrito{
flex:2;
display:flex;
flex-direction:column;
gap:15px;
max-height:500px;
overflow-y:auto;
}

/* PRODUCTO */

.producto{
display:grid;
grid-template-columns:80px 1fr 120px 120px 60px;
background:#1a1a1a;
padding:12px;
border-radius:10px;
align-items:center;
}

.producto img{
width:70px;
}

.precio{
color:#00c853;
}

/* CANTIDAD */

.cantidad{
display:flex;
gap:8px;
}

.cantidad button{
background:#333;
border:none;
color:white;
padding:5px;
cursor:pointer;
}

/* ELIMINAR */

.eliminar{
background:none;
border:none;
color:#e53935;
cursor:pointer;
}

/* RESUMEN */

.resumen{
flex:1;
background:#1a1a1a;
padding:25px;
border-radius:10px;
}

/* BOTONES */

.vaciar{
background:#e53935;
color:white;
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
transition:.3s;
}

.vaciar:hover{
background:#c62828;
}

.comprar{
background:#00c853;
color:white;
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

/* ===== METODO DE PAGO ===== */

.pago{
margin-top:20px;
}

.pago label{
display:block;
margin:8px 0;
cursor:pointer;
}

.form-tarjeta{
display:none;
margin-top:10px;
}

.form-tarjeta input{
width:100%;
margin-bottom:8px;
padding:8px;
border-radius:5px;
border:none;
}

/* ===== INTERES ===== */

.interes{
margin-top:50px;
text-align:center;
}

.slider{
overflow:hidden;
width:100%;
background:#111;
padding:30px 0;
}

.slider-track{
display:flex;
width:max-content;
animation:scroll 25s linear infinite;
}

/* TARJETAS UNIFORMES */

.slider a{
display:flex;
justify-content:center;
align-items:center;
width:140px;
height:120px;
margin:0 20px;
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
transition:.3s;
}

.slider a:hover{
transform:scale(1.1);
}

.slider img{
width:100%;
height:100%;
object-fit:contain;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

</style>
</head>

<body>

<header>
<div class="iconos">
<a href="index.html"><i class="fa-solid fa-house"></i></a>
<a href="productos.html"><i class="fa-solid fa-bag-shopping"></i></a>
</div>
<div class="logo">Carrito</div>
</header>

<!-- ENVIO GRATIS DINAMICO -->
<div class="envio" id="barraEnvio">
<i class="fa-solid fa-truck"></i> Calculando envío...
</div>

<!-- CONFIANZA -->
<section class="confianza">
<div class="confianza-item"><i class="fa-solid fa-lock"></i><p>Pago seguro</p></div>
<div class="confianza-item"><i class="fa-solid fa-truck-fast"></i><p>Envíos rápidos</p></div>
<div class="confianza-item"><i class="fa-solid fa-rotate-left"></i><p>Devoluciones fáciles</p></div>
<div class="confianza-item"><i class="fa-solid fa-headset"></i><p>Soporte 24/7</p></div>
</section>

<h1 style="text-align:center;margin-top:30px;">Tus productos</h1>

<div class="carrito-layout">

<div id="carrito"></div>

<div class="resumen">

<p id="subtotal"></p>
<p id="envioCosto"></p>
<p id="total"></p>

<div class="pago">
<h3>Método de pago</h3>

<label><input type="radio" name="pago" value="tarjeta"> Tarjeta</label>
<label><input type="radio" name="pago" value="paypal"> PayPal</label>
<label><input type="radio" name="pago" value="transferencia"> Transferencia</label>

<div class="form-tarjeta" id="formTarjeta">
<input type="text" placeholder="Número de tarjeta">
<input type="text" placeholder="Nombre">
<input type="text" placeholder="MM/AA">
<input type="text" placeholder="CVV">
</div>

</div>

<br>

<button class="vaciar" onclick="vaciar()">
<i class="fa-solid fa-trash"></i> Vaciar carrito
</button>

<br><br>

<button class="comprar" onclick="finalizarCompra()">
<i class="fa-solid fa-credit-card"></i> Finalizar compra
</button>

</div>

</div>

<!-- SLIDER -->
<section class="interes">
<h2>También te puede interesar</h2>

<div class="slider">
<div class="slider-track">

<a href="productos.html"><img src="img/nike1.jpg"></a>
<a href="productos.html"><img src="img/nike2.jpg"></a>
<a href="productos.html"><img src="img/nike3.jpg"></a>

<a href="productos.html"><img src="img/adidas1.jpg"></a>
<a href="productos.html"><img src="img/adidas2.jpg"></a>

<a href="productos.html"><img src="img/puma1.jpg"></a>
<a href="productos.html"><img src="img/puma2.jpg"></a>

<a href="productos.html"><img src="img/asics1.jpg"></a>
<a href="productos.html"><img src="img/asics2.jpg"></a>

<!-- LOOP -->
<a href="productos.html"><img src="img/nike1.jpg"></a>
<a href="productos.html"><img src="img/adidas1.jpg"></a>
<a href="productos.html"><img src="img/puma1.jpg"></a>

</div>
</div>
</section>

<script>

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
const contenedor = document.getElementById("carrito");

function actualizarBarraEnvio(subtotal){
let barra = document.getElementById("barraEnvio");

if(subtotal >= 5000){
barra.innerHTML = "🚚 Envío gratis aplicado";
barra.style.background = "#00c853";
}else{
let faltante = 5000 - subtotal;
barra.innerHTML = `🚚 Te faltan $${faltante} para envío gratis`;
barra.style.background = "#ff9800";
}
}

function mostrarCarrito(){
contenedor.innerHTML="";
let subtotal=0;

carrito.forEach((p,i)=>{
subtotal+=p.precio*(p.cantidad||1);

contenedor.innerHTML+=`
<div class="producto">
<img src="${p.img}">
<h3>${p.nombre}</h3>
<p class="precio">$${p.precio}</p>

<div class="cantidad">
<button onclick="restar(${i})">-</button>
<span>${p.cantidad||1}</span>
<button onclick="sumar(${i})">+</button>
</div>

<button class="eliminar" onclick="eliminar(${i})">
<i class="fa-solid fa-trash"></i>
</button>
</div>
`;
});

let envio=subtotal>=5000?0:150;

document.getElementById("subtotal").innerText="Subtotal: $"+subtotal;
document.getElementById("envioCosto").innerText="Envío: $"+envio;
document.getElementById("total").innerText="Total: $"+(subtotal+envio);

actualizarBarraEnvio(subtotal);
}

function sumar(i){carrito[i].cantidad=(carrito[i].cantidad||1)+1;guardar();}
function restar(i){if(carrito[i].cantidad>1)carrito[i].cantidad--;guardar();}
function eliminar(i){carrito.splice(i,1);guardar();}

function vaciar(){
if(confirm("¿Vaciar carrito?")){
carrito=[];
guardar();
}
}

function guardar(){
localStorage.setItem("carrito",JSON.stringify(carrito));
mostrarCarrito();
}

document.querySelectorAll("input[name='pago']").forEach(r=>{
r.addEventListener("change",()=>{
document.getElementById("formTarjeta").style.display =
r.value==="tarjeta"?"block":"none";
});
});

function finalizarCompra(){

let metodo=document.querySelector("input[name='pago']:checked");

if(!metodo){
alert("Selecciona método de pago");
return;
}

if(metodo.value==="tarjeta"){
let inputs=document.querySelectorAll("#formTarjeta input");
for(let i of inputs){
if(i.value===""){
alert("Completa datos de tarjeta");
return;
}
}
}

alert("Compra realizada correctamente");
}

mostrarCarrito();

</script>

</body>
</html>
