<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#0f0f0f;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:#111;
border-bottom:1px solid #222;
}

.iconos a{
color:white;
font-size:22px;
margin-right:20px;
transition:.3s;
}

.iconos a:hover{
color:#00c853;
}

.logo{
font-size:24px;
font-weight:700;
color:#00c853;
}

/* TITULO */

h1{
text-align:center;
margin:40px 0;
}

/* PRODUCTOS */

#carrito{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:20px;
}

.producto{
background:#1a1a1a;
padding:20px;
width:260px;
border-radius:10px;
text-align:center;
transition:.3s;
}

.producto:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,.6);
}

.producto img{
width:180px;
margin-bottom:10px;
}

.producto h3{
margin-bottom:10px;
}

button{
padding:8px 18px;
border:none;
border-radius:5px;
background:#e53935;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#c62828;
}

/* TOTAL */

.total{
text-align:center;
margin:30px;
font-size:20px;
}

</style>

</head>

<body>

<header>

<div class="iconos">

<a href="index.html">
<i class="fa-solid fa-arrow-left"></i>
</a>

<a href="bradley.html">
<i class="fa-solid fa-shoe-prints"></i>
</a>

</div>

<div class="logo">Carrito</div>

</header>


<h1>Tus productos</h1>

<div id="carrito"></div>

<div class="total" id="total"></div>

<script>

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

const contenedor = document.getElementById("carrito");
const totalElemento = document.getElementById("total");

function mostrarCarrito(){

contenedor.innerHTML="";

let total = 0;

carrito.forEach((producto,index)=>{

total += producto.precio || 0;

contenedor.innerHTML += `

<div class="producto">

<img src="${producto.img}">

<h3>${producto.nombre}</h3>

<p>$${producto.precio || 0}</p>

<button onclick="eliminar(${index})">
<i class="fa-solid fa-trash"></i> Eliminar
</button>

</div>

`;

});

totalElemento.innerHTML = "Total: $" + total;

}

function eliminar(index){

carrito.splice(index,1);

localStorage.setItem("carrito",JSON.stringify(carrito));

mostrarCarrito();

}

mostrarCarrito();

</script>

</body>
</html>
